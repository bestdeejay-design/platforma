<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Редактор LOVII Logo - Полный Микшер</title>
    <style>
        :root {
            --color-bg: #ffffff;
            --color-text: #1a1a1a;
            --color-border: #e0e0e0;
            --color-primary: #d84fc6;
            --color-secondary: #f64a8a;
        }

        [data-theme="dark"] {
            --color-bg: #1a1a1a;
            --color-text: #ffffff;
            --color-border: #333333;
            --color-primary: #ff8c42;
            --color-secondary: #d84fc6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            transition: all 0.3s;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .description {
            color: #666;
            font-size: 1rem;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .editor-panel {
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
        }

        .panel-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .svg-container {
            background: var(--color-bg);
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            width: 100%;
        }

        .svg-container svg {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 500;
            font-size: 0.9rem;
        }

        input[type="color"] {
            height: 50px;
            width: 100%;
            border: 2px solid var(--color-border);
            border-radius: 6px;
            cursor: pointer;
        }

        button {
            padding: 12px 20px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(216, 79, 198, 0.3);
        }

        .code-output {
            background: #1a1a1a;
            color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Color Mixer */
        .color-mixer {
            background: var(--color-bg);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .mixer-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .mixer-column {
            flex: 1;
            min-width: 120px;
        }

        .mixer-title {
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--color-text);
            font-weight: 600;
            text-align: center;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            padding: 4px;
        }

        .color-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            min-width: 0;
        }

        .color-option:hover {
            background: var(--color-border);
        }

        .color-option.active {
            border-color: var(--color-primary);
            background: rgba(216, 79, 198, 0.1);
        }

        .color-swatch {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .color-option span {
            font-size: 0.75rem;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        <div class="editor-panel">
            <h2 class="panel-title">📝 SVG код результата:</h2>
            <div class="code-output" id="codeOutput"></div>
        </div>
    </div>

    <script>
        // Обновление результата
        function updateResult() {
            try {
                const bgColor = document.getElementById('bgColor').value;
                const iconStrokeColor = document.getElementById('iconStrokeColor').value;
                const textColor = document.getElementById('textColor').value;
                const heartColor = document.getElementById('heartColor').value;
                const accentColor = document.getElementById('accentColor').value;

                // Фон (cls-1)
                const bgPath = document.querySelector('#resultSvg .cls-1');
                if (bgPath) {
                    bgPath.setAttribute('fill', bgColor);
                }

                // Обводка иконки (cls-7, cls-8)
                ['cls-7', 'cls-8'].forEach(cls => {
                    const elements = document.querySelectorAll(`#resultSvg .${cls}`);
                    elements.forEach(el => {
                        el.setAttribute('stroke', iconStrokeColor);
                    });
                });

                // Текст LOVII (cls-2)
                const textElements = document.querySelectorAll('#resultSvg .cls-2');
                textElements.forEach(el => {
                    el.setAttribute('fill', textColor);
                });

                // Сердечко (cls-6)
                const heartElement = document.querySelector('#resultSvg .cls-6');
                if (heartElement) {
                    heartElement.setAttribute('fill', heartColor);
                }

                // Акцентные элементы (cls-5)
                const accentElements = document.querySelectorAll('#resultSvg .cls-5');
                accentElements.forEach(el => {
                    el.setAttribute('fill', accentColor);
                });

                generateCode();
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        function generateCode() {
            try {
                const svgElement = document.getElementById('resultSvg');
                if (!svgElement) return;
                
                const serializer = new XMLSerializer();
                let svgCode = serializer.serializeToString(svgElement);
                
                svgCode = svgCode.replace(/></g, '>\n<');
                svgCode = svgCode.replace(/<path/g, '\n<path');
                svgCode = svgCode.replace(/<circle/g, '\n<circle');
                svgCode = svgCode.replace(/<polyline/g, '\n<polyline');
                
                const codeOutput = document.getElementById('codeOutput');
                if (codeOutput) {
                    codeOutput.textContent = svgCode;
                }
            } catch (error) {
                console.error('Ошибка генерации кода:', error);
            }
        }

        function copyCode() {
            try {
                const codeOutput = document.getElementById('codeOutput');
                if (!codeOutput) return;
                
                const range = document.createRange();
                range.selectNode(codeOutput);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                alert('SVG код скопирован! ✅');
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Не удалось скопировать 😞');
            }
        }

        // Цветовые палитры
        const bgColors = [
            { name: 'Белый', color: '#FFFFFF' },
            { name: 'Розовый', color: '#FFF7F9' },
            { name: 'Светло-серый', color: '#F5F5F5' },
            { name: 'Чёрный', color: '#1A1A1A' },
            { name: 'Тёмный', color: '#2B2B2B' },
            { name: 'Кремовый', color: '#FFFDD0' }
        ];

        const strokeColors = [
            { name: 'Тёмный', color: '#2B2B2B' },
            { name: 'Чёрный', color: '#000000' },
            { name: 'Серый', color: '#666666' },
            { name: 'Синий', color: '#1E3A5F' },
            { name: 'Коричневый', color: '#4A3728' },
            { name: 'Зелёный', color: '#2D5016' }
        ];

        const textColors = [
            { name: 'Тёмный', color: '#2B2B2B' },
            { name: 'Чёрный', color: '#000000' },
            { name: 'Серый', color: '#333333' },
            { name: 'Синий', color: '#1E3A5F' },
            { name: 'Тёмно-синий', color: '#0F2D52' },
            { name: 'Бордовый', color: '#800020' }
        ];

        const heartColors = [
            { name: 'Франц. розовый', color: '#F64A8A' },
            { name: 'Красный', color: '#FF0000' },
            { name: 'Розовый', color: '#FF69B4' },
            { name: 'Оранжевый', color: '#FF8C42' },
            { name: 'Малиновый', color: '#DC143C' },
            { name: 'Коралловый', color: '#FF6F61' }
        ];

        const accentColors = [
            { name: 'Оранжевый', color: '#FF8C42' },
            { name: 'Золотой', color: '#FFD700' },
            { name: 'Персиковый', color: '#FFCBA4' },
            { name: 'Коралл', color: '#FF7F50' },
            { name: 'Жёлтый', color: '#FFEB3B' },
            { name: 'Лайм', color: '#CDDC39' }
        ];

        // Текущие цвета
        let selectedBg = '#fff7f9';
        let selectedIconStroke = '#2b2b2b';
        let selectedText = '#2b2b2b';
        let selectedHeart = '#f64a8a';
        let selectedAccent = '#ff8c42';

        function createColorMixer() {
            const containers = {
                bgColors: document.getElementById('bgColors'),
                strokeColors: document.getElementById('strokeColors'),
                textColors: document.getElementById('textColors'),
                heartColors: document.getElementById('heartColors'),
                accentColors: document.getElementById('accentColors')
            };

            const colors = {
                bgColors, strokeColors, textColors, heartColors, accentColors
            };

            Object.keys(containers).forEach(key => {
                if (!containers[key]) return;
                
                colors[key].forEach(item => {
                    const option = document.createElement('div');
                    option.className = 'color-option';
                    option.innerHTML = `
                        <div class="color-swatch" style="background: ${item.color}"></div>
                        <span>${item.name}</span>
                    `;
                    
                    option.onclick = () => selectColor(key, item.color, option);
                    containers[key].appendChild(option);
                });
            });

            setTimeout(() => {
                const defaultColors = [
                    { key: 'bgColors', color: '#fff7f9' },
                    { key: 'strokeColors', color: '#2b2b2b' },
                    { key: 'textColors', color: '#2b2b2b' },
                    { key: 'heartColors', color: '#f64a8a' },
                    { key: 'accentColors', color: '#ff8c42' }
                ];

                defaultColors.forEach(({key, color}) => {
                    const options = document.getElementById(key)?.querySelectorAll('.color-option');
                    options?.forEach(opt => {
                        if (opt.textContent.includes(getColorName(key, color))) {
                            opt.click();
                        }
                    });
                });
            }, 100);
        }

        function getColorName(key, color) {
            const names = {
                bgColors: { '#fff7f9': 'Розовый', '#FFFFFF': 'Белый' },
                strokeColors: { '#2b2b2b': 'Тёмный' },
                textColors: { '#2b2b2b': 'Тёмный' },
                heartColors: { '#f64a8a': 'Франц. розовый' },
                accentColors: { '#ff8c42': 'Оранжевый' }
            };
            return names[key]?.[color] || '';
        }

        function selectColor(type, color, element) {
            switch(type) {
                case 'bgColors': selectedBg = color; break;
                case 'strokeColors': selectedIconStroke = color; break;
                case 'textColors': selectedText = color; break;
                case 'heartColors': selectedHeart = color; break;
                case 'accentColors': selectedAccent = color; break;
            }
            
            updateVisuals();
            highlightActive(element);
        }

        function updateVisuals() {
            document.getElementById('bgColor').value = selectedBg;
            document.getElementById('iconStrokeColor').value = selectedIconStroke;
            document.getElementById('textColor').value = selectedText;
            document.getElementById('heartColor').value = selectedHeart;
            document.getElementById('accentColor').value = selectedAccent;
            
            setTimeout(() => {
                updateResult();
            }, 10);
        }

        function highlightActive(element) {
            const parent = element.parentElement;
            if (parent) {
                Array.from(parent.children).forEach(child => child.classList.remove('active'));
            }
            element.classList.add('active');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.onload = function() {
            createColorMixer();
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateResult();
        };
    </script>
