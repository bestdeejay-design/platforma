<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 LOVII Logo - Все Цвета Оригинал</title>
    <style>
        :root {
            --color-bg: #ffffff;
            --color-text: #1a1a1a;
            --color-border: #e0e0e0;
            --color-primary: #d84fc6;
        }

        [data-theme="dark"] {
            --color-bg: #1a1a1a;
            --color-text: #ffffff;
            --color-border: #333333;
            --color-primary: #ff8c42;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .panel {
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .svg-container {
            background: var(--color-bg);
            border-radius: 8px;
            padding: 20px;
            overflow: auto;
            width: 100%;
        }

        .svg-container svg {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .color-mixer {
            background: var(--color-bg);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .mixer-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .mixer-column {
            flex: 1;
            min-width: 140px;
        }

        .mixer-title {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: var(--color-text);
            font-weight: 600;
            text-align: center;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
        }

        .color-option {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .color-option:hover {
            background: var(--color-border);
        }

        .color-option.active {
            border-color: var(--color-primary);
            background: rgba(216, 79, 198, 0.1);
        }

        .color-swatch {
            width: 18px;
            height: 18px;
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .color-option span {
            font-size: 0.65rem;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        button {
            padding: 12px 20px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(216, 79, 198, 0.3);
        }

        .code-output {
            background: #1a1a1a;
            color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>

    <script>
        // Обновление ВСЕХ цветов
        function updateResult() {
            const colors = {
                'cls-1': document.getElementById('cls1Color').value,
                'cls-2': document.getElementById('cls2Color').value,
                'cls-3': document.getElementById('cls3Color').value,
                'cls-4': document.getElementById('cls4Color').value,
                'cls-5': document.getElementById('cls5Color').value,
                'cls-6': document.getElementById('cls6Color').value,
                'cls-7': document.getElementById('cls7Color').value,
                'cls-8': document.getElementById('cls8Color').value
            };

            console.log('Updating colors:', colors);

            // Для каждого класса
            for (const [cls, color] of Object.entries(colors)) {
                const elements = document.querySelectorAll(`#resultSvg .${cls}`);
                console.log(`${cls}: ${elements.length} elements, color: ${color}`);
                
                elements.forEach(el => {
                    // Проверяем есть ли stroke в стилях
                    const hasStroke = el.getAttribute('stroke') !== null || 
                                     (el.classList.contains('cls-7') || el.classList.contains('cls-8'));
                    
                    if (hasStroke) {
                        el.setAttribute('stroke', color);
                        console.log(`  Set stroke ${color} for ${cls}`);
                    } else {
                        el.setAttribute('fill', color);
                        console.log(`  Set fill ${color} for ${cls}`);
                    }
                });
            }

            generateCode();
        }

        function generateCode() {
            const svgElement = document.getElementById('resultSvg');
            if (!svgElement) return;
            
            const serializer = new XMLSerializer();
            let svgCode = serializer.serializeToString(svgElement);
            
            svgCode = svgCode.replace(/></g, '>\n<');
            const codeOutput = document.getElementById('codeOutput');
            if (codeOutput) {
                codeOutput.textContent = svgCode;
            }
        }

        function copyCode() {
            const codeOutput = document.getElementById('codeOutput');
            if (!codeOutput) return;
            
            const range = document.createRange();
            range.selectNode(codeOutput);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            alert('SVG код скопирован! ✅');
        }

        // Общие цвета для всех классов
        const allColors = [
            { name: 'Оригинал', color: null },
            { name: 'Белый', color: '#FFFFFF' },
            { name: 'Чёрный', color: '#000000' },
            { name: 'Тёмный', color: '#2B2B2B' },
            { name: 'Серый', color: '#808080' },
            { name: 'Красный', color: '#FF0000' },
            { name: 'Розовый', color: '#FF69B4' },
            { name: 'Франц. розовый', color: '#F64A8A' },
            { name: 'Оранжевый', color: '#FF8C42' },
            { name: 'Золотой', color: '#FFD700' },
            { name: 'Жёлтый', color: '#FFEB3B' },
            { name: 'Зелёный', color: '#4CAF50' },
            { name: 'Голубой', color: '#87CEEB' },
            { name: 'Синий', color: '#2196F3' },
            { name: 'Фиолетовый', color: '#9C27B0' },
            { name: 'Бежевый', color: '#F5F5DC' },
            { name: 'Коричневый', color: '#8B4513' },
            { name: 'Бирюза', color: '#40E0D0' },
            { name: 'Лайм', color: '#CDDC39' },
            { name: 'Коралл', color: '#FF7F50' }
        ];

        // Оригинальные цвета для каждого класса
        const originalColors = {
            'cls1': '#fff7f9',
            'cls2': '#2b2b2b',
            'cls3': '#dce3e8',
            'cls4': '#2b2b2b',
            'cls5': '#ff8c42',
            'cls6': '#f64a8a',
            'cls7': '#2b2b2b',
            'cls8': '#2b2b2b'
        };

        // Текущие выбранные цвета
        let selectedColors = { ...originalColors };

        function createColorMixer() {
            for (let i = 1; i <= 8; i++) {
                const container = document.getElementById(`cls${i}Colors`);
                if (!container) continue;

                allColors.forEach(item => {
                    const option = document.createElement('div');
                    option.className = 'color-option';
                    
                    const colorValue = item.color || originalColors[`cls${i}`];
                    option.innerHTML = `
                        <div class="color-swatch" style="background: ${colorValue}"></div>
                        <span>${item.name}</span>
                    `;
                    
                    option.onclick = () => selectColor(i, colorValue, option);
                    container.appendChild(option);
                });
            }

            // Выбрать оригинальные цвета по умолчанию
            setTimeout(() => {
                for (let i = 1; i <= 8; i++) {
                    const container = document.getElementById(`cls${i}Colors`);
                    if (container && container.children.length > 0) {
                        selectColor(i, originalColors[`cls${i}`], container.children[0]);
                    }
                }
            }, 100);
        }

        function selectColor(clsNum, color, element) {
            selectedColors[`cls${clsNum}`] = color;
            
            // Обновить input
            document.getElementById(`cls${clsNum}Color`).value = color;
            
            // Подсветка активного
            const parent = element.parentElement;
            if (parent) {
                Array.from(parent.children).forEach(child => child.classList.remove('active'));
            }
            element.classList.add('active');
            
            setTimeout(() => updateResult(), 10);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.onload = function() {
            createColorMixer();
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateResult();
        };
    </script>
</body>
</html>
